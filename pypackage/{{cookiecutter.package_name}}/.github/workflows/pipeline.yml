name: Pipeline

on:
  pull_request:
  push:
    branches:
      - main
{%- if cookiecutter.git_flow == "main_develop" %}
      - develop
{%- endif %}
  workflow_dispatch:

permissions:
  contents: read
  actions: read
{% if cookiecutter.docs_type == "sphinx" %}
  pages: write
  id-token: write
{% endif %}

jobs:

  test-python:
    uses: NERC-CEH/dri-cicd/.github/workflows/test-python.yml@main
    with:
      use_uv: true
      use_pyright: true
      coverage_threshold: 90

{% if cookiecutter.docs_type == "sphinx" %}
  build-docs:
    uses: NERC-CEH/dri-cicd/.github/workflows/build-docs.yml@main
    with:
      use_uv: true
      pages_artifact_name: pages-artifact

  deploy-docs:
    needs: [build-docs]
    if: github.ref == 'refs/heads/main'
    uses: NERC-CEH/dri-cicd/.github/workflows/deploy-docs.yml@main
    with:
      pages_artifact_name: pages-artifact
{% endif %}
