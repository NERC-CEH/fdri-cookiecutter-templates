name: Pipeline

on:
  pull_request:
  push:
    branches:
      - main
{%- if cookiecutter.git_flow == "main_develop" %}
      - develop
{%- endif %}
  workflow_dispatch:

permissions:
  contents: read
  actions: read
{% if cookiecutter.docs_type == "sphinx" %}
  pages: write
  id-token: write
{% endif %}

jobs:

  test-python:
    uses: NERC-CEH/dri-cicd/.github/workflows/test-python.yml@main
    with:
      use_uv: true
      use_pyright: true
      coverage_threshold: 90

{% if cookiecutter.docs_type == "sphinx" %}
  build-docs:
    uses: NERC-CEH/dri-cicd/.github/workflows/build-docs.yml@main
    with:
      use_uv: true
      pages_artifact_name: pages-artifact

  deploy-docs:
    needs: [build-docs]
    if: github.ref == 'refs/heads/main'
    uses: NERC-CEH/dri-cicd/.github/workflows/deploy-docs.yml@main
    with:
      pages_artifact_name: pages-artifact
{% endif %}
{% if cookiecutter.auto_release == "yes" %}
  release-ready:
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check version bump and changelog
        run: |
          BASE_VER=$(git show origin/main:pyproject.toml | grep '^version' | sed 's/.*"\(.*\)"/\1/')
          NEW_VER=$(grep '^version' pyproject.toml | sed 's/.*"\(.*\)"/\1/')

          if [ "$BASE_VER" = "$NEW_VER" ]; then
            echo "No version bump - skipping changelog check"
            exit 0
          fi

          echo "Version bumped: $BASE_VER -> $NEW_VER"

          CHANGELOG="CHANGELOG/${NEW_VER}.md"

          if [ ! -f "$CHANGELOG" ]; then
            echo "ERROR: $CHANGELOG not found"
            exit 1
          fi

          if grep -q "<!-- Add release notes here -->" "$CHANGELOG"; then
            echo "ERROR: $CHANGELOG still contains the stub placeholder"
            exit 1
          fi

          LINES=$(tail -n +2 "$CHANGELOG" | grep -vc '^$')
          if [ "$LINES" -eq 0 ]; then
            echo "ERROR: $CHANGELOG has no content beyond the heading"
            exit 1
          fi

          echo "Changelog looks good"

  release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [test-python, release-ready]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Configure git identity
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Release
        env:
          GH_TOKEN: ${{ '{{' }} secrets.GITHUB_TOKEN {{ '}}' }}
        run: make release
{% endif %}
