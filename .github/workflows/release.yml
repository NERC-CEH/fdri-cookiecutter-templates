name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: ./.github/actions/check-release-ready
        id: check
        with:
          base_ref: HEAD~1

      - uses: astral-sh/setup-uv@v5
        if: steps.check.outputs.bumped == 'true'

      - name: Release
        if: steps.check.outputs.bumped == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: make release