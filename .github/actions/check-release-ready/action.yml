name: Check release ready
description: Verify a version bump has a populated changelog entry

inputs:
  base_ref:
    description: Git ref to compare version against
    required: true

outputs:
  bumped:
    description: Whether the version was bumped
    value: ${{ steps.check.outputs.bumped }}

runs:
  using: composite
  steps:
    - name: Check version bump and changelog
      id: check
      shell: bash
      run: |
        BASE_VER=$(git show ${{ inputs.base_ref }}:pyproject.toml | grep '^version' | sed 's/.*"\(.*\)"/\1/')
        NEW_VER=$(grep '^version' pyproject.toml | sed 's/.*"\(.*\)"/\1/')

        if [ "$BASE_VER" = "$NEW_VER" ]; then
          echo "No version bump detected"
          echo "bumped=false" >> $GITHUB_OUTPUT
          exit 0
        fi

        echo "Version bumped: $BASE_VER → $NEW_VER"
        echo "bumped=true" >> $GITHUB_OUTPUT

        CHANGELOG="CHANGELOG/${NEW_VER}.md"

        if [ ! -f "$CHANGELOG" ]; then
          echo "ERROR: $CHANGELOG not found"
          exit 1
        fi

        if grep -q "<!-- Add release notes here -->" "$CHANGELOG"; then
          echo "ERROR: $CHANGELOG still contains the stub placeholder"
          exit 1
        fi

        LINES=$(tail -n +2 "$CHANGELOG" | grep -vc '^$')
        if [ "$LINES" -eq 0 ]; then
          echo "ERROR: $CHANGELOG has no content beyond the heading"
          exit 1
        fi

        echo "Changelog looks good"