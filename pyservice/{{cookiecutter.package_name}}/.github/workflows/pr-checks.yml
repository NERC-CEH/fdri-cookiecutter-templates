{% raw %}name: PR Checks

on:
  pull_request:
    branches: [production]

jobs:
  release-ready:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/actions/check-release-ready
        with:
          base_ref: origin/production
{% endraw %}